<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Weather</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
            transition: background 1s ease;
            position: relative;
            overflow-x: hidden;
        }

        /* Default blue sky with clouds */
        body.sky-clear {
            background: linear-gradient(180deg, #4a90d9 0%, #87ceeb 50%, #b0e0e6 100%);
        }

        body.sky-clouds {
            background: linear-gradient(180deg, #6b8cae 0%, #8fa4b8 50%, #a8b8c8 100%);
        }

        body.sky-rain {
            background: linear-gradient(180deg, #4a5568 0%, #5a6a7a 50%, #6a7a8a 100%);
        }

        body.sky-thunderstorm {
            background: linear-gradient(180deg, #2d3748 0%, #3d4758 50%, #4a5568 100%);
        }

        body.sky-snow {
            background: linear-gradient(180deg, #a0aec0 0%, #cbd5e0 50%, #e2e8f0 100%);
        }

        body.sky-mist {
            background: linear-gradient(180deg, #718096 0%, #a0aec0 50%, #cbd5e0 100%);
        }

        body.sky-night {
            background: linear-gradient(180deg, #1a202c 0%, #2d3748 50%, #4a5568 100%);
        }

        /* Cloud container */
        .clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            filter: blur(2px);
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud-1 {
            width: 200px;
            height: 60px;
            top: 8%;
            left: -10%;
            animation: float-cloud 60s linear infinite;
        }
        .cloud-1::before {
            width: 100px;
            height: 80px;
            top: -40px;
            left: 20px;
        }
        .cloud-1::after {
            width: 120px;
            height: 70px;
            top: -30px;
            left: 70px;
        }

        .cloud-2 {
            width: 150px;
            height: 50px;
            top: 15%;
            left: -5%;
            animation: float-cloud 80s linear infinite;
            animation-delay: -20s;
            opacity: 0.6;
        }
        .cloud-2::before {
            width: 80px;
            height: 60px;
            top: -30px;
            left: 15px;
        }
        .cloud-2::after {
            width: 90px;
            height: 55px;
            top: -25px;
            left: 50px;
        }

        .cloud-3 {
            width: 180px;
            height: 55px;
            top: 5%;
            left: -8%;
            animation: float-cloud 70s linear infinite;
            animation-delay: -40s;
            opacity: 0.7;
        }
        .cloud-3::before {
            width: 90px;
            height: 70px;
            top: -35px;
            left: 25px;
        }
        .cloud-3::after {
            width: 110px;
            height: 65px;
            top: -28px;
            left: 60px;
        }

        .cloud-4 {
            width: 160px;
            height: 45px;
            top: 20%;
            left: -6%;
            animation: float-cloud 90s linear infinite;
            animation-delay: -60s;
            opacity: 0.5;
        }
        .cloud-4::before {
            width: 70px;
            height: 55px;
            top: -28px;
            left: 20px;
        }
        .cloud-4::after {
            width: 85px;
            height: 50px;
            top: -22px;
            left: 55px;
        }

        @keyframes float-cloud {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(calc(100vw + 250px));
            }
        }

        /* Rain effect */
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            display: none;
        }

        .rain.active {
            display: block;
        }

        .rain-drop {
            position: absolute;
            width: 2px;
            height: 15px;
            background: linear-gradient(transparent, rgba(174, 194, 224, 0.8));
            animation: rain-fall linear infinite;
        }

        @keyframes rain-fall {
            0% {
                transform: translateY(-100px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        /* Snow effect */
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            display: none;
        }

        .snow.active {
            display: block;
        }

        .snowflake {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: snow-fall linear infinite;
        }

        @keyframes snow-fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .search-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #city-input {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            width: 300px;
            max-width: 100%;
            outline: none;
            color: #333;
        }

        #city-input:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.5);
        }

        .btn {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        #search-btn {
            background: #ff6b6b;
        }

        #search-btn:hover {
            background: #ee5a5a;
        }

        #location-btn {
            background: #4ecdc4;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #location-btn:hover {
            background: #3dbdb5;
        }

        #location-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .btn:focus {
            outline: 3px solid rgba(255, 255, 255, 0.5);
            outline-offset: 2px;
        }

        .unit-toggle {
            display: flex;
            justify-content: center;
            margin-top: 15px;
            gap: 10px;
        }

        .unit-btn {
            padding: 8px 16px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .unit-btn.active {
            background: white;
            color: #1e3c72;
        }

        .unit-btn:focus {
            outline: 3px solid rgba(255, 255, 255, 0.5);
            outline-offset: 2px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            text-align: center;
            padding: 20px;
            background: rgba(255, 107, 107, 0.3);
            border-radius: 10px;
            margin: 20px 0;
        }

        .weather-container {
            display: none;
        }

        .weather-container.show {
            display: block;
        }

        .current-weather {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
        }

        .current-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .location h2 {
            font-size: 2rem;
        }

        .location p {
            opacity: 0.8;
        }

        .temperature {
            text-align: center;
        }

        .temp-value {
            font-size: 4rem;
            font-weight: 300;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
        }

        .weather-description {
            text-transform: capitalize;
            font-size: 1.2rem;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .detail-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-card .label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .detail-card .value {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .forecast-section {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
        }

        .forecast-section h3 {
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .hourly-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.3) transparent;
        }

        .hourly-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .hourly-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .hourly-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        .hourly-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 10px;
            border-radius: 10px;
            text-align: center;
            min-width: 65px;
            flex-shrink: 0;
        }

        .hourly-card .time {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-bottom: 6px;
        }

        .hourly-card .hourly-icon {
            width: 36px;
            height: 36px;
        }

        .hourly-card .hourly-temp {
            font-weight: 600;
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .forecast-card .day {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .forecast-card .forecast-icon {
            width: 50px;
            height: 50px;
        }

        .forecast-card .temps {
            margin-top: 10px;
        }

        .forecast-card .high {
            font-weight: 600;
        }

        .forecast-card .low {
            opacity: 0.7;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }

            #city-input {
                width: 100%;
            }

            .search-container {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .temp-value {
                font-size: 3rem;
            }

            .current-header {
                flex-direction: column;
                text-align: center;
            }

            .hourly-card {
                min-width: 58px;
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body class="sky-clear">
    <!-- Cloud elements -->
    <div class="clouds">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
    </div>

    <!-- Rain effect -->
    <div class="rain" id="rain"></div>

    <!-- Snow effect -->
    <div class="snow" id="snow"></div>

    <div class="container">
        <header>
            <h1>Real-Time Weather</h1>
            <div class="search-container">
                <input
                    type="text"
                    id="city-input"
                    placeholder="Enter city name..."
                    aria-label="City name"
                    autocomplete="off"
                >
                <button id="search-btn" class="btn" aria-label="Search for weather">Search</button>
                <button id="location-btn" class="btn" aria-label="Use my location">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
                    </svg>
                    Use My Location
                </button>
            </div>
            <div class="unit-toggle" role="group" aria-label="Temperature unit">
                <button class="unit-btn active" data-unit="metric" aria-pressed="true">°C</button>
                <button class="unit-btn" data-unit="imperial" aria-pressed="false">°F</button>
            </div>
        </header>

        <div id="loading" class="loading hidden">Loading weather data</div>
        <div id="error" class="error hidden"></div>

        <div id="weather-container" class="weather-container">
            <section class="current-weather" aria-label="Current weather conditions">
                <div class="current-header">
                    <div class="location">
                        <h2 id="city-name"></h2>
                        <p id="date"></p>
                    </div>
                    <div class="temperature">
                        <img id="weather-icon" class="weather-icon" src="" alt="">
                        <div class="temp-value" id="temperature"></div>
                        <div class="weather-description" id="description"></div>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail-card">
                        <div class="label">Feels Like</div>
                        <div class="value" id="feels-like"></div>
                    </div>
                    <div class="detail-card">
                        <div class="label">Humidity</div>
                        <div class="value" id="humidity"></div>
                    </div>
                    <div class="detail-card">
                        <div class="label">Wind Speed</div>
                        <div class="value" id="wind"></div>
                    </div>
                    <div class="detail-card">
                        <div class="label">UV Index</div>
                        <div class="value" id="uv-index"></div>
                    </div>
                    <div class="detail-card">
                        <div class="label">Visibility</div>
                        <div class="value" id="visibility"></div>
                    </div>
                </div>
            </section>

            <section class="forecast-section" aria-label="Hourly weather forecast">
                <h3>Hourly Forecast</h3>
                <div id="hourly-scroll" class="hourly-scroll"></div>
            </section>

            <section class="forecast-section" aria-label="7-day weather forecast">
                <h3>7-Day Forecast</h3>
                <div id="forecast-grid" class="forecast-grid"></div>
            </section>
        </div>
    </div>

    <script>
        // API Configuration
        const API_KEY = 'f080df48b13f21f1bb3ed91231a45957';
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';
        const GEO_URL = 'https://api.openweathermap.org/geo/1.0';

        // DOM Elements
        const cityInput = document.getElementById('city-input');
        const searchBtn = document.getElementById('search-btn');
        const locationBtn = document.getElementById('location-btn');
        const unitBtns = document.querySelectorAll('.unit-btn');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const weatherContainer = document.getElementById('weather-container');
        const rainEl = document.getElementById('rain');
        const snowEl = document.getElementById('snow');

        // State
        let currentUnit = localStorage.getItem('weatherUnit') || 'metric';
        let currentCity = localStorage.getItem('lastCity') || '';
        let currentCoords = null;
        let weatherCache = {};
        let debounceTimer;

        // Initialize weather effects
        function initWeatherEffects() {
            // Create rain drops
            for (let i = 0; i < 100; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
                drop.style.animationDelay = Math.random() * 2 + 's';
                rainEl.appendChild(drop);
            }

            // Create snowflakes
            for (let i = 0; i < 50; i++) {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.style.left = Math.random() * 100 + '%';
                flake.style.width = (4 + Math.random() * 6) + 'px';
                flake.style.height = flake.style.width;
                flake.style.animationDuration = (3 + Math.random() * 4) + 's';
                flake.style.animationDelay = Math.random() * 5 + 's';
                snowEl.appendChild(flake);
            }
        }

        // Update background based on weather
        function updateBackground(weatherData) {
            const body = document.body;
            const weatherId = weatherData.weather[0].id;
            const icon = weatherData.weather[0].icon;
            const isNight = icon.includes('n');

            // Remove all sky classes
            body.classList.remove('sky-clear', 'sky-clouds', 'sky-rain', 'sky-thunderstorm', 'sky-snow', 'sky-mist', 'sky-night');
            rainEl.classList.remove('active');
            snowEl.classList.remove('active');

            // Determine weather type
            if (isNight && weatherId === 800) {
                body.classList.add('sky-night');
            } else if (weatherId >= 200 && weatherId < 300) {
                // Thunderstorm
                body.classList.add('sky-thunderstorm');
                rainEl.classList.add('active');
            } else if (weatherId >= 300 && weatherId < 600) {
                // Rain/Drizzle
                body.classList.add('sky-rain');
                rainEl.classList.add('active');
            } else if (weatherId >= 600 && weatherId < 700) {
                // Snow
                body.classList.add('sky-snow');
                snowEl.classList.add('active');
            } else if (weatherId >= 700 && weatherId < 800) {
                // Mist/Fog/Haze
                body.classList.add('sky-mist');
            } else if (weatherId === 800) {
                // Clear
                body.classList.add('sky-clear');
            } else if (weatherId > 800) {
                // Clouds
                body.classList.add('sky-clouds');
            } else {
                body.classList.add('sky-clear');
            }

            // Adjust cloud opacity based on weather
            const clouds = document.querySelectorAll('.cloud');
            if (weatherId === 800) {
                clouds.forEach(c => c.style.opacity = '0.7');
            } else if (weatherId > 800 && weatherId <= 802) {
                clouds.forEach(c => c.style.opacity = '0.8');
            } else if (weatherId > 802) {
                clouds.forEach(c => c.style.opacity = '0.9');
            } else if (weatherId >= 500 && weatherId < 600) {
                clouds.forEach(c => c.style.opacity = '0.5');
            } else {
                clouds.forEach(c => c.style.opacity = '0.6');
            }
        }

        // Initialize
        function init() {
            initWeatherEffects();
            setActiveUnit(currentUnit);
            if (currentCity) {
                cityInput.value = currentCity;
                fetchWeather(currentCity);
            }
            setupEventListeners();
        }

        function setupEventListeners() {
            searchBtn.addEventListener('click', handleSearch);
            locationBtn.addEventListener('click', handleLocationRequest);
            cityInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearch();
            });
            cityInput.addEventListener('input', debounceSearch);
            unitBtns.forEach(btn => {
                btn.addEventListener('click', () => handleUnitChange(btn.dataset.unit));
            });
        }

        function debounceSearch() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const city = cityInput.value.trim();
                if (city.length >= 3) {
                    // Could implement autocomplete here
                }
            }, 300);
        }

        function handleSearch() {
            const city = cityInput.value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }
            if (!/^[a-zA-Z\s,'-]+$/.test(city)) {
                showError('Please enter a valid city name');
                return;
            }
            currentCoords = null;
            fetchWeather(city);
        }

        function handleLocationRequest() {
            if (!navigator.geolocation) {
                showError('Geolocation is not supported by your browser');
                return;
            }

            locationBtn.disabled = true;
            locationBtn.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
                </svg>
                Locating...
            `;

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentCoords = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude
                    };
                    fetchWeatherByCoords(currentCoords.lat, currentCoords.lon);
                    resetLocationButton();
                },
                (error) => {
                    let message = 'Unable to retrieve your location';
                    if (error.code === error.PERMISSION_DENIED) {
                        message = 'Location access denied. Please enable location permissions.';
                    }
                    showError(message);
                    resetLocationButton();
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function resetLocationButton() {
            locationBtn.disabled = false;
            locationBtn.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
                </svg>
                Use My Location
            `;
        }

        function handleUnitChange(unit) {
            if (unit === currentUnit) return;
            currentUnit = unit;
            localStorage.setItem('weatherUnit', unit);
            setActiveUnit(unit);
            if (currentCoords) {
                fetchWeatherByCoords(currentCoords.lat, currentCoords.lon);
            } else if (currentCity) {
                fetchWeather(currentCity);
            }
        }

        function setActiveUnit(unit) {
            unitBtns.forEach(btn => {
                const isActive = btn.dataset.unit === unit;
                btn.classList.toggle('active', isActive);
                btn.setAttribute('aria-pressed', isActive);
            });
        }

        async function fetchWeatherByCoords(lat, lon) {
            const cacheKey = `${lat.toFixed(2)}-${lon.toFixed(2)}-${currentUnit}`;
            const cached = weatherCache[cacheKey];
            if (cached && Date.now() - cached.timestamp < 5 * 60 * 1000) {
                displayWeather(cached.data, cached.forecast);
                return;
            }

            showLoading();
            hideError();

            try {
                // Get location name from coordinates
                const reverseGeoResponse = await fetch(
                    `${GEO_URL}/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${API_KEY}`
                );
                const reverseGeoData = await reverseGeoResponse.json();
                const locationName = reverseGeoData.length
                    ? `${reverseGeoData[0].name}, ${reverseGeoData[0].country}`
                    : 'Your Location';

                // Fetch weather data
                const [weatherResponse, forecastResponse, uvResponse] = await Promise.all([
                    fetch(`${BASE_URL}/weather?lat=${lat}&lon=${lon}&units=${currentUnit}&appid=${API_KEY}`),
                    fetch(`${BASE_URL}/forecast?lat=${lat}&lon=${lon}&units=${currentUnit}&appid=${API_KEY}`),
                    fetch(`${BASE_URL}/uvi?lat=${lat}&lon=${lon}&appid=${API_KEY}`)
                ]);

                if (!weatherResponse.ok || !forecastResponse.ok) {
                    throw new Error('Failed to fetch weather data. Please try again.');
                }

                const weatherData = await weatherResponse.json();
                const forecastData = await forecastResponse.json();

                let uvIndex = 'N/A';
                if (uvResponse.ok) {
                    const uvData = await uvResponse.json();
                    uvIndex = uvData.value ?? 'N/A';
                }

                weatherData.uvIndex = uvIndex;
                weatherData.displayName = locationName;

                // Cache the results
                weatherCache[cacheKey] = {
                    data: weatherData,
                    forecast: forecastData,
                    timestamp: Date.now()
                };

                // Update input field with location name
                cityInput.value = locationName;
                currentCity = '';
                localStorage.removeItem('lastCity');

                displayWeather(weatherData, forecastData);
            } catch (error) {
                showError(error.message);
            } finally {
                hideLoading();
            }
        }

        async function fetchWeather(city) {
            const cacheKey = `${city}-${currentUnit}`;
            const cached = weatherCache[cacheKey];
            if (cached && Date.now() - cached.timestamp < 5 * 60 * 1000) {
                displayWeather(cached.data, cached.forecast);
                return;
            }

            showLoading();
            hideError();

            try {
                // Get coordinates first
                const geoResponse = await fetch(
                    `${GEO_URL}/direct?q=${encodeURIComponent(city)}&limit=1&appid=${API_KEY}`
                );
                const geoData = await geoResponse.json();

                if (!geoData.length) {
                    throw new Error('City not found. Please check the spelling and try again.');
                }

                const { lat, lon, name, country } = geoData[0];

                // Fetch current weather and forecast
                const [weatherResponse, forecastResponse, uvResponse] = await Promise.all([
                    fetch(`${BASE_URL}/weather?lat=${lat}&lon=${lon}&units=${currentUnit}&appid=${API_KEY}`),
                    fetch(`${BASE_URL}/forecast?lat=${lat}&lon=${lon}&units=${currentUnit}&appid=${API_KEY}`),
                    fetch(`${BASE_URL}/uvi?lat=${lat}&lon=${lon}&appid=${API_KEY}`)
                ]);

                if (!weatherResponse.ok || !forecastResponse.ok) {
                    throw new Error('Failed to fetch weather data. Please try again.');
                }

                const weatherData = await weatherResponse.json();
                const forecastData = await forecastResponse.json();

                let uvIndex = 'N/A';
                if (uvResponse.ok) {
                    const uvData = await uvResponse.json();
                    uvIndex = uvData.value ?? 'N/A';
                }

                weatherData.uvIndex = uvIndex;
                weatherData.displayName = `${name}, ${country}`;

                // Cache the results
                weatherCache[cacheKey] = {
                    data: weatherData,
                    forecast: forecastData,
                    timestamp: Date.now()
                };

                // Save to localStorage
                currentCity = city;
                localStorage.setItem('lastCity', city);

                displayWeather(weatherData, forecastData);
            } catch (error) {
                showError(error.message);
            } finally {
                hideLoading();
            }
        }

        function displayWeather(data, forecast) {
            const unitSymbol = currentUnit === 'metric' ? '°C' : '°F';
            const speedUnit = currentUnit === 'metric' ? 'm/s' : 'mph';

            // Update background based on weather
            updateBackground(data);

            // Current weather
            document.getElementById('city-name').textContent = data.displayName || data.name;
            document.getElementById('date').textContent = formatDate(new Date());
            document.getElementById('temperature').textContent = `${Math.round(data.main.temp)}${unitSymbol}`;
            document.getElementById('description').textContent = data.weather[0].description;
            document.getElementById('feels-like').textContent = `${Math.round(data.main.feels_like)}${unitSymbol}`;
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            document.getElementById('wind').textContent = `${data.wind.speed} ${speedUnit}`;
            document.getElementById('uv-index').textContent = data.uvIndex;
            document.getElementById('visibility').textContent = `${(data.visibility / 1000).toFixed(1)} km`;

            const iconEl = document.getElementById('weather-icon');
            iconEl.src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
            iconEl.alt = data.weather[0].description;

            // Hourly forecast (next 12 hours - interpolated)
            displayHourlyForecast(data, forecast, unitSymbol);

            // 7-day forecast (using 3-hour forecast data, grouped by day)
            displayForecast(forecast, unitSymbol);

            weatherContainer.classList.add('show');
        }

        function displayHourlyForecast(currentData, forecastData, unitSymbol) {
            const hourlyScroll = document.getElementById('hourly-scroll');
            hourlyScroll.innerHTML = '';

            const now = new Date();
            const hourlyData = [];

            // Add current hour
            hourlyData.push({
                time: now,
                temp: currentData.main.temp,
                icon: currentData.weather[0].icon,
                description: currentData.weather[0].description
            });

            // Get forecast data points for interpolation
            const forecastPoints = forecastData.list.slice(0, 5); // Get first 5 3-hour intervals

            // Interpolate hourly data
            for (let i = 1; i <= 12; i++) {
                const targetTime = new Date(now.getTime() + i * 60 * 60 * 1000);

                // Find the two forecast points to interpolate between
                let before = null;
                let after = null;

                for (let j = 0; j < forecastPoints.length; j++) {
                    const pointTime = new Date(forecastPoints[j].dt * 1000);
                    if (pointTime <= targetTime) {
                        before = { data: forecastPoints[j], time: pointTime };
                    }
                    if (pointTime > targetTime && !after) {
                        after = { data: forecastPoints[j], time: pointTime };
                        break;
                    }
                }

                // Use current data as "before" if needed
                if (!before) {
                    before = {
                        data: { main: currentData.main, weather: currentData.weather },
                        time: now
                    };
                }

                let temp, icon, description;

                if (before && after) {
                    // Interpolate temperature
                    const totalDiff = after.time - before.time;
                    const targetDiff = targetTime - before.time;
                    const ratio = targetDiff / totalDiff;

                    temp = before.data.main.temp + (after.data.main.temp - before.data.main.temp) * ratio;

                    // Use the icon from the closer time point
                    if (ratio < 0.5) {
                        icon = before.data.weather[0].icon;
                        description = before.data.weather[0].description;
                    } else {
                        icon = after.data.weather[0].icon;
                        description = after.data.weather[0].description;
                    }
                } else if (before) {
                    // Use the last known data
                    temp = before.data.main.temp;
                    icon = before.data.weather[0].icon;
                    description = before.data.weather[0].description;
                } else {
                    // Fallback to first forecast point
                    temp = forecastPoints[0].main.temp;
                    icon = forecastPoints[0].weather[0].icon;
                    description = forecastPoints[0].weather[0].description;
                }

                hourlyData.push({
                    time: targetTime,
                    temp: temp,
                    icon: icon,
                    description: description
                });
            }

            // Render hourly cards
            hourlyData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'hourly-card';
                card.innerHTML = `
                    <div class="time">${index === 0 ? 'Now' : formatTime(item.time)}</div>
                    <img class="hourly-icon"
                         src="https://openweathermap.org/img/wn/${item.icon}@2x.png"
                         alt="${item.description}">
                    <div class="hourly-temp">${Math.round(item.temp)}${unitSymbol}</div>
                `;
                hourlyScroll.appendChild(card);
            });
        }

        function displayForecast(forecastData, unitSymbol) {
            const forecastGrid = document.getElementById('forecast-grid');
            forecastGrid.innerHTML = '';

            // Group forecast by day
            const dailyForecasts = {};
            forecastData.list.forEach(item => {
                const date = new Date(item.dt * 1000);
                const dayKey = date.toDateString();
                if (!dailyForecasts[dayKey]) {
                    dailyForecasts[dayKey] = {
                        date: date,
                        temps: [],
                        icons: [],
                        descriptions: []
                    };
                }
                dailyForecasts[dayKey].temps.push(item.main.temp);
                dailyForecasts[dayKey].icons.push(item.weather[0].icon);
                dailyForecasts[dayKey].descriptions.push(item.weather[0].description);
            });

            // Get up to 7 days
            const days = Object.values(dailyForecasts).slice(0, 7);

            days.forEach(day => {
                const high = Math.round(Math.max(...day.temps));
                const low = Math.round(Math.min(...day.temps));
                const midIndex = Math.floor(day.icons.length / 2);
                const icon = day.icons[midIndex];
                const description = day.descriptions[midIndex];

                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `
                    <div class="day">${formatDay(day.date)}</div>
                    <img class="forecast-icon"
                         src="https://openweathermap.org/img/wn/${icon}@2x.png"
                         alt="${description}">
                    <div class="temps">
                        <span class="high">${high}${unitSymbol}</span>
                        <span class="low">${low}${unitSymbol}</span>
                    </div>
                `;
                forecastGrid.appendChild(card);
            });
        }

        function formatDate(date) {
            return date.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function formatTime(date) {
            return date.toLocaleTimeString('en-US', {
                hour: 'numeric',
                hour12: true
            });
        }

        function formatDay(date) {
            const today = new Date();
            if (date.toDateString() === today.toDateString()) {
                return 'Today';
            }
            return date.toLocaleDateString('en-US', { weekday: 'short' });
        }

        function showLoading() {
            loadingEl.classList.remove('hidden');
            weatherContainer.classList.remove('show');
        }

        function hideLoading() {
            loadingEl.classList.add('hidden');
        }

        function showError(message) {
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
            weatherContainer.classList.remove('show');
        }

        function hideError() {
            errorEl.classList.add('hidden');
        }

        // Initialize app
        init();
    </script>
